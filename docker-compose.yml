# ============================================================================
# Jenkins Playground — Master + Slave (SSH & JNLP) Architecture
# ============================================================================
#
# Architecture:
#   jenkins-master  ──SSH──▶  ssh-agent-1
#                   ──SSH──▶  ssh-agent-2
#                   ◀─JNLP──  jnlp-agent-1
#
# Usage:
#   make up        # or: docker compose up --build -d
#   make down      # or: docker compose down
#   make clean     # removes volumes + secrets
#
# Jenkins UI:  http://localhost:8080  (admin / admin)
# ============================================================================

services:
  # ── Jenkins Master ────────────────────────────────────────────────────────
  jenkins-master:
    build:
      context: ./master
      dockerfile: Dockerfile
    container_name: jenkins-master
    restart: unless-stopped
    ports:
      - "8080:8080" # Web UI
      - "50000:50000" # JNLP agent port
    volumes:
      - jenkins_home:/var/jenkins_home
    secrets:
      - jenkins_agent_key
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc.yaml
      - SECRETS=/run/secrets
    networks:
      - jenkins-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── SSH Agent 1 ───────────────────────────────────────────────────────────
  ssh-agent-1:
    build:
      context: ./ssh-agent
      dockerfile: Dockerfile
    container_name: ssh-agent-1
    restart: unless-stopped
    environment:
      - JENKINS_AGENT_SSH_PUBKEY=${JENKINS_AGENT_SSH_PUBKEY}
    expose:
      - "22"
    networks:
      - jenkins-net
    depends_on:
      jenkins-master:
        condition: service_started

  # ── SSH Agent 2 ───────────────────────────────────────────────────────────
  ssh-agent-2:
    build:
      context: ./ssh-agent
      dockerfile: Dockerfile
    container_name: ssh-agent-2
    restart: unless-stopped
    environment:
      - JENKINS_AGENT_SSH_PUBKEY=${JENKINS_AGENT_SSH_PUBKEY}
    expose:
      - "22"
    networks:
      - jenkins-net
    depends_on:
      jenkins-master:
        condition: service_started

  # ── JNLP (Inbound) Agent 1 ───────────────────────────────────────────────
  # This agent initiates the connection TO the master (reverse of SSH).
  # It uses the official inbound-agent image, no custom Dockerfile needed.
  # The agent secret is auto-generated by Jenkins; we use the init-jnlp-agent
  # helper service to retrieve it and pass it along.
  jnlp-agent-1:
    image: jenkins/inbound-agent:latest-jdk21
    container_name: jnlp-agent-1
    restart: unless-stopped
    init: true
    environment:
      - JENKINS_URL=http://jenkins-master:8080
      - JENKINS_AGENT_NAME=jnlp-agent-1
      - JENKINS_SECRET=${JNLP_SECRET:-}
      - JENKINS_WEB_SOCKET=true
    networks:
      - jenkins-net
    depends_on:
      jenkins-master:
        condition: service_healthy

# ── Shared Resources ──────────────────────────────────────────────────────
networks:
  jenkins-net:
    driver: bridge
    name: jenkins-net

volumes:
  jenkins_home:
    name: jenkins_home

secrets:
  jenkins_agent_key:
    file: ./secrets/jenkins_agent_key
